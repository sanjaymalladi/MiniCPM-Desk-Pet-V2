<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MiniCPM 桌宠聊天</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #161a22;
    --panel-2: #1d222c;
    --border: #262c38;
    --text: #e6e8ee;
    --muted: #8a93a6;
    --accent: #9b8cff;
    --accent-2: #67d6ff;
    --user: #2a2e3b;
    --bot: #1b2330;
    --danger: #ff6b6b;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    font-size: 15px; line-height: 1.55;
  }
  .app {
    height: 100%; display: grid;
    grid-template-rows: auto 1fr auto; max-width: 880px; margin: 0 auto;
  }
  header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
    background: linear-gradient(180deg, rgba(155,140,255,0.08), transparent);
  }
  .pet {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--panel-2);
    display: grid; place-items: center;
    font-size: 22px;
    border: 1px solid var(--border);
  }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; }
  header .meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .badge {
    margin-left: auto;
    padding: 4px 10px; border-radius: 999px;
    background: var(--panel-2); border: 1px solid var(--border);
    font-size: 12px; color: var(--muted);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted);
  }
  .dot.ok { background: #5ed694; box-shadow: 0 0 8px #5ed694; }
  .dot.warn { background: #ffcc66; }
  .dot.err { background: var(--danger); }

  main {
    overflow-y: auto;
    padding: 20px; display: flex; flex-direction: column; gap: 14px;
  }
  .msg {
    display: flex; gap: 10px; align-items: flex-start;
  }
  .msg .avatar {
    width: 28px; height: 28px; border-radius: 8px;
    flex: 0 0 auto;
    display: grid; place-items: center; font-size: 14px;
    background: var(--panel-2); border: 1px solid var(--border);
  }
  .msg.user { flex-direction: row-reverse; }
  .msg .bubble {
    max-width: 78%;
    padding: 10px 14px; border-radius: 14px;
    background: var(--bot); border: 1px solid var(--border);
    white-space: pre-wrap; word-wrap: break-word;
  }
  .msg.user .bubble {
    background: var(--user);
    border-color: #383f50;
  }
  .msg.assistant .bubble.streaming::after {
    content: "▍"; color: var(--accent); margin-left: 2px;
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .think {
    margin-bottom: 6px;
    padding: 8px 12px; border-left: 3px solid var(--accent);
    background: rgba(155,140,255,0.08);
    border-radius: 6px;
    font-size: 13px; color: var(--muted);
    white-space: pre-wrap;
  }
  .think .label { color: var(--accent); font-weight: 600; margin-right: 6px; }

  footer {
    border-top: 1px solid var(--border);
    padding: 12px 16px 16px;
    background: var(--panel);
  }
  .input-row {
    display: flex; align-items: flex-end; gap: 8px;
    background: var(--panel-2);
    border: 1px solid var(--border); border-radius: 14px;
    padding: 8px 8px 8px 12px;
  }
  textarea {
    flex: 1; border: none; outline: none; resize: none;
    background: transparent; color: var(--text); font: inherit;
    max-height: 200px; min-height: 24px;
    padding: 6px 0;
  }
  button {
    border: none; background: var(--accent); color: #0b0c10;
    font-weight: 600; padding: 8px 14px; border-radius: 10px;
    cursor: pointer; font-size: 13px;
    transition: filter .15s ease;
  }
  button:hover { filter: brightness(1.08); }
  button:disabled { background: #3b3f4a; color: var(--muted); cursor: not-allowed; }
  .toolbar {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-top: 8px; font-size: 12px; color: var(--muted);
    align-items: center;
  }
  .toolbar .grow { flex: 1; }
  .toolbar a, .toolbar button.link {
    background: none; padding: 0; color: var(--accent-2);
    border: none; font-size: 12px; cursor: pointer;
    text-decoration: underline; font-weight: 500;
  }
  .empty {
    margin: auto; text-align: center; color: var(--muted);
    padding: 40px 20px;
  }
  .empty h2 { color: var(--text); margin: 0 0 6px; }
  code { background: #11151d; padding: 1px 5px; border-radius: 4px; font-size: 12px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="pet">🐾</div>
    <div>
      <h1>MiniCPM 0.9B · 桌宠聊天</h1>
      <div class="meta" id="meta">本地推理 · 桌宠会跟随对话做反应动画</div>
    </div>
    <span class="badge"><span class="dot" id="petDot"></span><span id="petText">检测桌宠中…</span></span>
  </header>

  <main id="log">
    <div class="empty" id="empty">
      <h2>嗨，我是 MiniCPM 🐱</h2>
      <p>试试问我点什么吧。回复是流式的；同时桌面上的桌宠会同步做<br>
      <code>thinking → working → attention</code> 反应。</p>
    </div>
  </main>

  <footer>
    <div class="input-row">
      <textarea id="input" placeholder="按 Enter 发送，Shift+Enter 换行" rows="1"></textarea>
      <button id="send">发送</button>
    </div>
    <div class="toolbar">
      <button class="link" id="reset">清空对话</button>
      <button class="link" id="ping">叫桌宠注意</button>
      <label style="display:inline-flex;gap:4px;align-items:center;cursor:pointer;">
        <input type="checkbox" id="thinkToggle" />
        <span>显示思考</span>
      </label>
      <span class="grow"></span>
      <span id="hint"></span>
    </div>
  </footer>
</div>

<script>
const log = document.getElementById("log");
const empty = document.getElementById("empty");
const input = document.getElementById("input");
const sendBtn = document.getElementById("send");
const resetBtn = document.getElementById("reset");
const pingBtn = document.getElementById("ping");
const meta = document.getElementById("meta");
const petDot = document.getElementById("petDot");
const petText = document.getElementById("petText");
const hint = document.getElementById("hint");

const history = [];
let busy = false;
let abort = null;

function autoresize() {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 200) + "px";
}
input.addEventListener("input", autoresize);

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    submit();
  }
});

sendBtn.addEventListener("click", submit);
resetBtn.addEventListener("click", () => {
  history.length = 0;
  log.innerHTML = "";
  log.appendChild(empty);
});
pingBtn.addEventListener("click", async () => {
  await fetch("/api/state", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({state: "attention"}),
  });
});

function addBubble(role, content) {
  if (empty.parentNode) empty.remove();
  const wrap = document.createElement("div");
  wrap.className = "msg " + role;
  const avatar = document.createElement("div");
  avatar.className = "avatar";
  avatar.textContent = role === "user" ? "🧑" : "🐾";
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = content;
  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  log.appendChild(wrap);
  log.scrollTop = log.scrollHeight;
  return { wrap, bubble };
}

function ensureThinkBox(wrap) {
  let box = wrap.querySelector(".think");
  if (!box) {
    box = document.createElement("div");
    box.className = "think";
    const label = document.createElement("span");
    label.className = "label";
    label.textContent = "思考";
    const text = document.createElement("span");
    text.className = "think-text";
    box.appendChild(label);
    box.appendChild(text);
    wrap.querySelector(".bubble").before(box);
  }
  return box.querySelector(".think-text");
}

async function submit() {
  if (busy) return;
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  autoresize();

  addBubble("user", text);
  history.push({role: "user", content: text});
  const {wrap, bubble} = addBubble("assistant", "");
  bubble.classList.add("streaming");

  busy = true;
  sendBtn.disabled = true;
  hint.textContent = "生成中…";

  const thinking = document.getElementById("thinkToggle").checked;

  abort = new AbortController();
  try {
    const resp = await fetch("/api/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        messages: history,
        stream: true,
        max_new_tokens: 768,
        thinking,
      }),
      signal: abort.signal,
    });
    if (!resp.ok) throw new Error("HTTP " + resp.status);

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";
    let acc = "";
    let thinkAcc = "";
    while (true) {
      const {value, done} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream: true});
      let idx;
      while ((idx = buffer.indexOf("\n\n")) >= 0) {
        const chunk = buffer.slice(0, idx);
        buffer = buffer.slice(idx + 2);
        if (!chunk.startsWith("data:")) continue;
        const payload = chunk.slice(5).trim();
        if (!payload) continue;
        try {
          const obj = JSON.parse(payload);
          if (obj.event === "delta") {
            acc += obj.content;
            bubble.textContent = acc;
            log.scrollTop = log.scrollHeight;
          } else if (obj.event === "think") {
            thinkAcc += obj.content;
            ensureThinkBox(wrap).textContent = thinkAcc;
            log.scrollTop = log.scrollHeight;
          } else if (obj.event === "error") {
            acc += "\n\n[模型错误] " + obj.message;
            bubble.textContent = acc;
          }
        } catch {}
      }
    }
    history.push({role: "assistant", content: acc});
  } catch (err) {
    bubble.textContent += "\n\n[网络错误] " + err.message;
  } finally {
    bubble.classList.remove("streaming");
    busy = false;
    sendBtn.disabled = false;
    hint.textContent = "";
    abort = null;
  }
}

async function probe() {
  try {
    const r = await fetch("/api/health");
    const d = await r.json();
    meta.textContent = `${d.device} · ${d.dtype.replace("torch.", "")} · 模型已加载`;
    petDot.classList.add("ok");
    petText.textContent = "桌宠就绪";
  } catch {
    petDot.classList.add("err");
    petText.textContent = "服务未就绪";
  }
}
probe();
</script>
</body>
</html>
