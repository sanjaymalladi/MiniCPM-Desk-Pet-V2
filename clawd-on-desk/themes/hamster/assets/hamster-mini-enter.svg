<svg id="mini-stage" xmlns="http://www.w3.org/2000/svg" width="580" height="480" viewBox="-150 -40 580 480" role="img" aria-labelledby="title desc" style="pointer-events:none">
  <title id="title">Hamster mini-enter v1 (scripted)</title>
  <desc id="desc">Mini-mode enter transition for clawd-on-desk / MiniCPM-Desk-Pet, right-edge variant (host mirrors for left edge). Plays ONCE then holds at mini-idle rest. The host slides the window to the edge first, then plays this in place; the hamster burrows out: (1) both paws reach from off-screen, slightly past then retract to grab the edge (enter-hands-reach, screen x = master y, paw transforms untouched + tip-clipped); (2) the head emerges from the burrow — necks down then lifts with an overshoot look-up about the neck (187,252) via enter-head-roll, like a small animal poking out; (3) the whole body slides in (enter-slide) and settles. Endpoint is verbatim mini-idle rest (cheek = continuousYawFace0, paw/tie confirmed transforms, all wrappers zeroed) so the host handoff to mini-idle is seamless. A CSS .duration-probe (animation 1.1s, opacity-only keyframe) lets the host read the asset cycle (getMiniEnterDurationMs) and schedule the mini-idle switch. Default plays once and holds; ?loop=1 replays the whole entry for demo. svg root keeps pointer-events:none. Exposes window.__miniEnter. Pure paths + soft-lift filter, no image/gradient/fetch (the duration-probe keyframe is opacity-only).</desc>
  <style><![CDATA[
  .duration-probe { opacity: 0; animation: mini-enter-duration-probe 1.1s linear 1 both; }
  @keyframes mini-enter-duration-probe { from { opacity: 0; } to { opacity: 0; } }
  ]]></style>
  <defs>
    <filter id="soft-lift" x="-14%" y="-14%" width="128%" height="128%" color-interpolation-filters="sRGB">
      <feMorphology in="SourceAlpha" operator="dilate" radius="1.45" result="edge-spread"/>
      <feComposite in="edge-spread" in2="SourceAlpha" operator="out" result="edge-ring"/>
      <feGaussianBlur in="edge-ring" stdDeviation="0.42" result="edge-soft"/>
      <feFlood flood-color="#7a604d" flood-opacity=".13" result="edge-color"/>
      <feComposite in="edge-color" in2="edge-soft" operator="in" result="edge-rim"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="3.0" result="soft-edge"/>
      <feFlood flood-color="#8b735e" flood-opacity=".07" result="halo-color"/>
      <feComposite in="halo-color" in2="soft-edge" operator="in" result="halo"/>
      <feOffset in="SourceAlpha" dx="0" dy="7" result="shadow-offset"/>
      <feGaussianBlur in="shadow-offset" stdDeviation="7" result="shadow-blur"/>
      <feFlood flood-color="#3a2d23" flood-opacity=".105" result="shadow-color"/>
      <feComposite in="shadow-color" in2="shadow-blur" operator="in" result="ambient-shadow"/>
      <feMerge>
        <feMergeNode in="ambient-shadow"/>
        <feMergeNode in="halo"/>
        <feMergeNode in="edge-rim"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
      <!-- 手 clip = mini-sleep 定稿原 rect 不动不补偿（sleep-peek 同款）-->
      <clipPath id="mini-paw-clip-right" clipPathUnits="userSpaceOnUse">
        <rect x="340" y="236" width="78" height="64"/>
      </clipPath>
      <clipPath id="mini-paw-clip-left" clipPathUnits="userSpaceOnUse">
        <rect x="-44" y="236" width="78" height="64"/>
      </clipPath>
    </defs>
  <rect class="duration-probe" x="0" y="0" width="1" height="1" fill="none" pointer-events="none"/>

  <g id="mini-rotate" style="transform-origin:0 0" transform="rotate(-90 187 230)">
      <!-- enter-slide: 整体探入平移（横躺后母版 y = 屏幕水平；身体从屏外 slide 进 rest；爪在内层额外先探）-->
      <g id="enter-slide" style="transform-origin:0 0">
      <g id="hamster-flat-master-v11" style="transform-origin:0 0" filter="url(#soft-lift)" fill-rule="evenodd" clip-rule="evenodd">
        <g id="tail" data-part="tail">
          <circle id="tail-fill" cx="187" cy="356" r="22" fill="#d8a686"/>
        </g>
        <g id="feet-layer" data-layer="behind-body">
          <g id="left-foot" data-part="left-foot">
            <path id="left-foot-fill" d="M109 392 C101 389 93 391 87 396 C80 402 84 410 94 414 C105 418 118 414 125 405 C131 397 123 394 109 392 Z" fill="#d8a686"/>
          </g>
          <g id="right-foot" data-part="right-foot">
            <path id="right-foot-fill" d="M265 392 C273 389 281 391 287 396 C294 402 290 410 280 414 C269 418 256 414 249 405 C243 397 251 394 265 392 Z" fill="#d8a686"/>
          </g>
        </g>

        <g id="body-layer" data-layer="body">
          <g id="body-belly" data-part="body-belly">
            <path id="body-belly-fill" d="M187 200 C113 200 60 251 60 322 C60 380 101 412 187 412 C273 412 314 380 314 322 C314 251 261 200 187 200Z" fill="#fff8f0"/>
          </g>
        </g>

        <!-- 头 roll wrapper（钻出洞:缩脖低头→抬头过冲,绕脖根;爪/领带在它外面不跟）-->
        <g id="enter-head-roll">
        <g id="ears-layer" data-layer="ears">
          <g id="left-ear" data-part="left-ear">
            <circle id="left-ear-outer" cx="101" cy="73" r="34" fill="#d8a686"/>
            <circle id="left-ear-inner" cx="101" cy="73" r="18" fill="#f8b2aa"/>
          </g>
          <g id="right-ear" data-part="right-ear">
            <circle id="right-ear-outer" cx="286" cy="73" r="34" fill="#d8a686"/>
            <circle id="right-ear-inner" cx="286" cy="73" r="18" fill="#f8b2aa"/>
          </g>
        </g>

        <g id="head-tufts" data-part="head-tufts">
          <path id="left-tuft" d="M182 49 C184 35 187 24 192 15" fill="none" stroke="#d8a686" stroke-width="6.5" stroke-linecap="round" transform="rotate(-32 182 49)"/>
          <path id="right-tuft" d="M200 50 C203 34 208 24 214 16" fill="none" stroke="#d8a686" stroke-width="6.5" stroke-linecap="round" transform="rotate(-32 200 50)"/>
        </g>

        <g id="head-layer" data-layer="head">
          <g id="head-cap" data-part="head-cap">
            <path id="head-cap-fill" d="M64 153 C64 88 116 48 187 48 C258 48 310 88 310 153 C310 214 257 253 187 253 C117 253 64 214 64 153Z" fill="#edc8a5"/>
          </g>
          <g id="cheek-muzzle" data-part="cheek-muzzle">
            <!-- cheek d = mini-idle rest continuousYawFace0（终点逐字对齐,前半段控制点已重建,后半段同母版;比母版鼻梁偏 2.16px,P4 连续模型）-->
            <path id="cheek-muzzle-fill" d="M65 153 C73.732 154.147 125.006 162.438 137.77 162.56 C148.712 162.665 166.029 155.554 171.37 154.02 C176.711 152.486 185.672 147.294 189.69 147.65 C193.708 148.006 205.187 155.939 210.43 157.48 C215.673 159.021 230.521 163.091 240.66 162.63 C252.488 162.092 300.799 154.156 309 153 C331 178 336 221 303 246 C270 268 104 268 71 246 C38 221 43 178 65 153Z" fill="#fff8f0"/>
          </g>
          <g id="cheek-creases" data-part="cheek-creases" opacity=".35">
            <path id="left-cheek-crease" d="M62 238 C70 250 84 256 100 256" fill="none" stroke="#e6d7c6" stroke-width="3" stroke-linecap="round"/>
            <path id="right-cheek-crease" d="M312 238 C304 250 290 256 274 256" fill="none" stroke="#e6d7c6" stroke-width="3" stroke-linecap="round"/>
          </g>
        </g>

        <g id="face-layer" data-layer="face">
          <!-- 眉 = 母版 neutral（enter 不挑眉,保持 rest）-->
          <g id="brows" data-part="brows">
            <path id="left-brow" d="M127 116 C137 108 148 110 154 118" fill="none" stroke="#7b4a23" stroke-width="7" stroke-linecap="round"/>
            <path id="right-brow" d="M247 116 C237 108 226 110 220 118" fill="none" stroke="#7b4a23" stroke-width="7" stroke-linecap="round"/>
          </g>
          <!-- 醒着 = 睁眼椭圆（墨镜挡住,语义上是醒的;终点接 mini-idle）-->
          <g id="eyes" data-part="eyes">
            <ellipse id="left-eye" cx="138" cy="157" rx="12.5" ry="17" fill="#5a300f"/>
            <ellipse id="right-eye" cx="237" cy="157" rx="12.5" ry="17" fill="#5a300f"/>
          </g>
          <!-- 墨镜惯性微晃 wrapper：头钻出抬头那下墨镜阻尼振荡一下再归位 -->
          <g id="enter-glasses-lag">
            <g id="sunglasses" data-part="sunglasses">
              <g id="left-sunglass" data-part="left-sunglass">
                <path id="left-sunglass-frame" d="M99.22 132 C114.76 125.7 144.16 126.96 166 131.58 C171.46 132.84 174.82 136.62 174.4 143.34 C171.88 170.22 152.98 187.44 129.46 187.44 C109.72 187.44 96.7 170.64 96.28 146.7 C96.28 139.56 94.18 134.52 99.22 132 Z M109.54 137.88 C123.82 133.68 145.66 134.94 162.88 138.72 C161.62 159.3 149.44 178.62 133.9 179.46 C118.78 180.3 107.86 164.76 107.44 146.7 C107.44 142.5 106.18 139.56 109.54 137.88 Z" fill="#171716" fill-rule="evenodd" stroke="#111111" stroke-width="2.52" stroke-linejoin="round"/>
                <path id="left-sunglass-lens" d="M109.54 137.88 C123.82 133.68 145.66 134.94 162.88 138.72 C161.62 159.3 149.44 178.62 133.9 179.46 C118.78 180.3 107.86 164.76 107.44 146.7 C107.44 142.5 106.18 139.56 109.54 137.88 Z" fill="#16140f" opacity=".97"/>
                <path id="left-lens-main-shine" d="M151.96 135.36 L124.24 178.62" fill="none" stroke="#ffffff" stroke-width="3.36" stroke-linecap="round" opacity=".12"/>
                <path id="left-lens-small-shine" d="M161.62 140.82 L146.08 167.28" fill="none" stroke="#ffffff" stroke-width="2.1" stroke-linecap="round" opacity=".09"/>
              </g>
              <g id="right-sunglass" data-part="right-sunglass">
                <path id="right-sunglass-frame" d="M275.62 132 C260.08 125.7 230.68 126.96 208.84 131.58 C203.38 132.84 200.02 136.62 200.44 143.34 C202.96 170.22 221.86 187.44 245.38 187.44 C265.12 187.44 278.14 170.64 278.56 146.7 C278.56 139.56 280.66 134.52 275.62 132 Z M265.3 137.88 C251.02 133.68 229.18 134.94 211.96 138.72 C213.22 159.3 225.4 178.62 240.94 179.46 C256.06 180.3 266.98 164.76 267.4 146.7 C267.4 142.5 268.66 139.56 265.3 137.88 Z" fill="#171716" fill-rule="evenodd" stroke="#111111" stroke-width="2.52" stroke-linejoin="round"/>
                <path id="right-sunglass-lens" d="M265.3 137.88 C251.02 133.68 229.18 134.94 211.96 138.72 C213.22 159.3 225.4 178.62 240.94 179.46 C256.06 180.3 266.98 164.76 267.4 146.7 C267.4 142.5 268.66 139.56 265.3 137.88 Z" fill="#16140f" opacity=".97"/>
                <path id="right-lens-main-shine" d="M255.64 135.36 L227.92 178.62" fill="none" stroke="#ffffff" stroke-width="3.36" stroke-linecap="round" opacity=".12"/>
                <path id="right-lens-small-shine" d="M265.3 140.82 L249.76 167.28" fill="none" stroke="#ffffff" stroke-width="2.1" stroke-linecap="round" opacity=".09"/>
              </g>
              <path id="sunglasses-bridge" d="M173.98 144.18 C182.38 138.3 192.46 138.3 200.86 144.18" fill="none" stroke="#111111" stroke-width="4.2" stroke-linecap="round"/>
            </g>
          </g>
          <g id="blushes" data-part="blushes">
            <ellipse id="left-blush" cx="92" cy="185" rx="17" ry="11" fill="#f8aaa2" opacity=".9"/>
            <ellipse id="right-blush" cx="281" cy="185" rx="17" ry="11" fill="#f8aaa2" opacity=".9"/>
          </g>
          <g id="nose-mouth" data-part="nose-mouth">
            <ellipse id="nose-fill" cx="187" cy="170" rx="10" ry="7.5" fill="#7b4a23"/>
            <path id="mouth-left" d="M187 177 C187 190 180 198 171 198 C166 198 163 195 163 192" fill="none" stroke="#7b4a23" stroke-width="5" stroke-linecap="round"/>
            <path id="mouth-right" d="M187 177 C187 190 194 198 203 198 C208 198 211 195 211 192" fill="none" stroke="#7b4a23" stroke-width="5" stroke-linecap="round"/>
          </g>
        </g>
        </g><!-- /enter-head-roll -->

        <!-- 爪探 wrapper：横躺后屏幕水平 = 母版系 y，纯平移（定稿串不碰、不翻爪）;爪头绝对偏移由 pawAbs 曲线驱动 -->
        <g id="enter-hands-reach">
        <g id="hands-layer" data-layer="hands-above-face">
          <g id="left-hand" data-part="left-hand" clip-path="url(#mini-paw-clip-left)"
             transform="translate(122.5 7) rotate(90 -9.5 268) translate(-9.5 268) scale(1.25) translate(9.5 -268)">
            <path id="left-hand-base" d="M118 249.5 L-9.5 249.5 C-19.7 249.5 -28 257.8 -28 268 C-28 278.2 -19.7 286.5 -9.5 286.5 L118 286.5 C123 279.1 123 256.9 118 249.5 Z" fill="#fff8f0"/>
            <path id="left-paw-tip" d="M8.5 249.5 L-9.5 249.5 C-19.7 249.5 -28 257.8 -28 268 C-28 278.2 -19.7 286.5 -9.5 286.5 L8.5 286.5 C16 278.2 16 257.8 8.5 249.5 Z" fill="#d8a686"/>
          </g>
          <g id="right-hand" data-part="right-hand" clip-path="url(#mini-paw-clip-right)"
             transform="translate(-122.5 7) rotate(270 383.5 268) translate(383.5 268) scale(1.25) translate(-383.5 -268)">
            <path id="right-hand-base" d="M256 249.5 L383.5 249.5 C393.7 249.5 402 257.8 402 268 C402 278.2 393.7 286.5 383.5 286.5 L256 286.5 C251 279.1 251 256.9 256 249.5 Z" fill="#fff8f0"/>
            <path id="right-paw-tip" d="M365.5 249.5 L383.5 249.5 C393.7 249.5 402 257.8 402 268 C402 278.2 393.7 286.5 383.5 286.5 L365.5 286.5 C358 278.2 358 257.8 365.5 249.5 Z" fill="#d8a686"/>
          </g>
        </g>
        </g><!-- /enter-hands-reach -->

        <!-- 领带 wrapper（领结钉死、下摆被拽进来惯性甩）-->
        <g id="enter-tie-lag">
        <g id="tie" data-part="tie" transform="translate(153 260)">
          <g id="tie-blade-sway">
            <path id="tie-shadow" d="M24 27 L44 27 L54 68 C55 72.5 53 76 49 80 L38 93 C35.5 96 31 96 28.5 93 L17.5 80 C14 76 13 72.5 14.5 68 Z" fill="#000000" opacity=".08" transform="translate(7 6.5) rotate(59.5 33.5 14) translate(2 2)"/>
            <path id="tie-blade" d="M24 24 L44 24 L54 66 C55 70.5 53 74 49 78 L38 91 C35.5 94 31 94 28.5 91 L17.5 78 C14 74 13 70.5 14.5 66 Z" fill="#21201e" stroke="#151515" stroke-width="2" stroke-linejoin="round" transform="translate(7 6.5) rotate(59.5 33.5 14)"/>
            <path id="tie-center-fold" d="M34 28 L34 84" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity=".07" transform="translate(7 6.5) rotate(59.5 33.5 14)"/>
            <path id="tie-left-fold" d="M27 28 L21 64" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round" opacity=".18" transform="translate(7 6.5) rotate(59.5 33.5 14)"/>
          </g>
          <path id="tie-knot" d="M23 3 L44 3 L51 14 L44 25 L23 25 L16 14 Z" fill="#2d2c29" stroke="#151515" stroke-width="2" stroke-linejoin="round" transform="translate(0 5) rotate(24 33.5 14)"/>
          <path id="tie-knot-highlight" d="M26 8 L40 8" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity=".12" transform="translate(0 5) rotate(24 33.5 14)"/>
        </g>
        </g><!-- /enter-tie-lag -->
      </g>
      </g><!-- /enter-slide -->
    </g>

  <script type="application/ecmascript"><![CDATA[
(() => {
  "use strict";
  const svg = document.getElementById("mini-stage");

  // ── confirmed 常量 ──
  const ROLL_PIVOT = { x: 187, y: 252 };   // 头 roll 轴 = 母版系脖根（sleep-peek/alert/peek 同款）

  // ── mini-enter 可调参数（tuner state）──
  const state = {
    // ① 整体探入（身体从屏外 slide 进来；slideDist=屏外起点偏移,横躺后母版 y+ = 屏幕水平外侧）
    slideDist: 188, slideDelay: 0.1, slideDur: 0.58,
    // ② 爪先探（爪头绝对偏移:快速冲到屏内+伸稍多 → 随身体回 rest=0）
    pawDur: 0.4, pawOver: 46, pawBack: 0.42,
    // ③ 头钻出洞（缩脖低头 rollDown → 抬头过冲"仰" rollOver → settle 0）
    rollDown: 20, rollOver: 8, headDelay: 0.36, headDur: 0.52,
    // 软部件惯性（被拽进来滞后甩,阻尼振荡）
    tieLag: 3.0, glassLag: 4,
    speed: 1.0
  };

  // ── 时间线：入场过渡播一次 ≈ T_ENTER 停在 rest（host 接手切 mini-idle）；tuner 加 T_TAIL 自动重播 ──
  const T_ENTER = 1.1, T_TAIL = 0.7, T_LOOP = T_ENTER + T_TAIL;
  const LOOP_MODE = /[?&]loop=1/.test(location.search);  // 默认播一次停 rest(host 切 mini-idle); ?loop=1 循环演示

  // ── 工具 ──
  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
  function lerp(a, b, t) { return a + (b - a) * t; }
  function smooth01(v) { const t = clamp(v, 0, 1); return t * t * (3 - 2 * t); }
  function easeOutCubic(v) { const t = clamp(v, 0, 1) - 1; return 1 + t * t * t; }
  function fmt(v) { return String(parseFloat(Number(v).toFixed(2))); }
  function setT(id, transform) {
    const node = svg.querySelector(`#${id}`);
    if (node) { if (transform) node.setAttribute("transform", transform); else node.removeAttribute("transform"); }
  }

  // ── enter 时间线：返回各动作归一化进度 ──
  function enterAt(tSec) {
    const tt = LOOP_MODE ? clamp(tSec % T_LOOP, 0, T_ENTER) : Math.min(tSec, T_ENTER);
    const slideP = easeOutCubic(clamp((tt - state.slideDelay) / state.slideDur, 0, 1));
    const headP = clamp((tt - state.headDelay) / state.headDur, 0, 1);
    return { tt, slideP, headP };
  }

  // ── 爪头绝对偏移曲线（屏外 slideDist → 快速冲到 -pawOver 屏内稍多 → 回 rest 0）──
  function pawAbs(tt) {
    if (tt < state.pawDur) {
      return lerp(state.slideDist, -state.pawOver, easeOutCubic(tt / state.pawDur));
    }
    const back = clamp((tt - state.pawDur) / state.pawBack, 0, 1);
    return lerp(-state.pawOver, 0, smooth01(back));
  }

  // ── 头 roll 曲线（缩脖低头 rollDown → 抬头过冲到 -rollOver "仰" → settle 0）──
  function headRoll(headP) {
    if (headP <= 0) return state.rollDown;
    if (headP >= 1) return 0;
    if (headP < 0.62) {
      return lerp(state.rollDown, -state.rollOver, easeOutCubic(headP / 0.62));
    }
    return lerp(-state.rollOver, 0, smooth01((headP - 0.62) / 0.38));
  }

  // ── 每帧 ──
  let t0 = performance.now();
  function frame(now) {
    const t = (now - t0) / 1000 * state.speed;
    const e = enterAt(t);

    // ① 整体探入：enter-slide 平移（母版 y = 屏幕水平；slideDist→0 = 从屏外进屏内 rest）
    const slideOff = state.slideDist * (1 - e.slideP);
    setT("enter-slide", slideOff > 0.1 ? `translate(0 ${fmt(slideOff)})` : "");

    // ② 爪先探：爪头绝对偏移 = pawAbs；相对身体的额外平移 = 绝对 - 身体 slideOff（爪先冲到边搭住,身体后到）
    const reach = pawAbs(e.tt) - slideOff;
    setT("enter-hands-reach", Math.abs(reach) > 0.1 ? `translate(0 ${fmt(reach)})` : "");

    // ③ 头钻出洞：缩脖低头 → 抬头过冲 → settle（绕脖根 roll）
    const roll = headRoll(e.headP);
    setT("enter-head-roll", Math.abs(roll) > 0.02 ? `rotate(${fmt(roll)} ${ROLL_PIVOT.x} ${ROLL_PIVOT.y})` : "");

    // ④ 墨镜惯性：跟头钻出滞后微晃（抬头那下墨镜阻尼振荡）
    const glassPhase = clamp(e.tt - state.headDelay, 0, 99);
    const bob = (e.headP > 0 && e.headP < 1)
      ? -state.glassLag * Math.sin(2 * Math.PI * 2.2 * glassPhase) * Math.exp(-glassPhase * 3.0)
      : 0;
    setT("enter-glasses-lag", Math.abs(bob) > 0.02 ? `translate(0 ${fmt(bob)})` : "");

    // ⑤ 领带惯性：身体被拽进来,下摆滞后甩（阻尼振荡,软部件反应）
    const slidePhase = clamp(e.tt - state.slideDelay, 0, 99);
    const tieSway = (e.slideP > 0 && e.slideP < 1)
      ? state.tieLag * Math.sin(2 * Math.PI * 1.6 * slidePhase) * Math.exp(-slidePhase * 2.2)
      : 0;
    setT("tie-blade-sway", Math.abs(tieSway) > 0.02 ? `rotate(${fmt(tieSway)} 33.5 19)` : "");

    refreshJson();
    requestAnimationFrame(frame);
  }

  function refreshJson() {} // 面板已剥离(导出无 tuner)

  requestAnimationFrame(frame);
  window.__miniEnter = { state, enterAt, pawAbs, headRoll, T: { T_ENTER, T_TAIL, T_LOOP } };
})();
  ]]></script>
</svg>
