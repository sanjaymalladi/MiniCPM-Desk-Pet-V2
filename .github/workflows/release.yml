name: Release MiniCPM Desk Pet

# Cross-platform release pipeline. Each build job:
#   1) downloads the official ggml-org/llama.cpp llama-server release
#      into minicpm-sidecar/bin/<triple>/
#   2) builds our thin FastAPI gateway for the same target
#   3) runs electron-builder in clawd-on-desk/; extraResources picks up
#      both binaries automatically.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  build-mac:
    runs-on: macos-14
    name: mac-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Fetch official llama.cpp release
        working-directory: minicpm-sidecar
        env:
          TARGET_TRIPLE: mac-arm64
        run: bash ./scripts/fetch-llama-release.sh

      - name: Build gateway
        working-directory: minicpm-sidecar
        run: ./scripts/build-gateway.sh

      - name: Verify sidecar binaries
        working-directory: minicpm-sidecar/bin/mac-arm64
        run: |
          ls -la
          chmod +x llama-server minicpm-sidecar
          ./llama-server --version
          ./minicpm-sidecar --help >/dev/null

      - name: Check signing credentials
        id: signing
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
        run: |
          if [ -n "${CSC_LINK:-}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Apple Developer ID certificate
        if: ${{ steps.signing.outputs.available == 'true' }}
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CSC_LINK" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$CSC_KEY_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: npm install
        working-directory: clawd-on-desk
        run: npm install --no-audit --no-fund

      - name: Fetch LoRA adapters
        working-directory: clawd-on-desk
        run: node scripts/fetch-adapters.js

      - name: electron-builder (dmg, sign + notarize)
        working-directory: clawd-on-desk
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --arm64 --publish never

      - name: Verify code signature
        if: ${{ steps.signing.outputs.available == 'true' }}
        run: |
          DMG_FILE=$(find clawd-on-desk/dist -name '*.dmg' | head -1)
          if [ -n "$DMG_FILE" ]; then
            echo "Verifying: $DMG_FILE"
            codesign --verify --deep --strict --verbose=2 "$DMG_FILE" || true
            spctl --assess --type open --context context:primary-signature --verbose "$DMG_FILE" || true
          fi

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
          rm -f $RUNNER_TEMP/certificate.p12

      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer-mac-arm64
          path: |
            clawd-on-desk/dist/*.dmg
            clawd-on-desk/dist/latest-mac.yml

  build-linux:
    runs-on: ubuntu-22.04
    name: linux-x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Fetch official llama.cpp release
        working-directory: minicpm-sidecar
        env:
          TARGET_TRIPLE: linux-x64
          LLAMA_BACKEND: cpu
        run: bash ./scripts/fetch-llama-release.sh

      - name: Build gateway
        working-directory: minicpm-sidecar
        run: ./scripts/build-gateway.sh

      - name: Verify sidecar binaries
        working-directory: minicpm-sidecar/bin/linux-x64
        run: |
          ls -la
          chmod +x llama-server minicpm-sidecar
          ./llama-server --version
          ./minicpm-sidecar --help >/dev/null

      - name: npm install
        working-directory: clawd-on-desk
        run: npm install --no-audit --no-fund

      - name: Fetch LoRA adapters
        working-directory: clawd-on-desk
        run: node scripts/fetch-adapters.js

      - name: electron-builder (AppImage + deb)
        working-directory: clawd-on-desk
        run: npx electron-builder --linux --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: |
            clawd-on-desk/dist/*.AppImage
            clawd-on-desk/dist/*.deb
            clawd-on-desk/dist/latest-linux.yml

  build-windows:
    runs-on: windows-2022
    name: win-x64
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          irm https://astral.sh/uv/install.ps1 | iex
          Add-Content $env:GITHUB_PATH "$env:USERPROFILE\.local\bin"

      - name: Fetch official llama.cpp release
        working-directory: minicpm-sidecar
        run: |
          .\scripts\fetch-llama-release.ps1 -Backend cpu -Target win-x64
          .\scripts\fetch-llama-release.ps1 -Backend vulkan -Target win-x64

      - name: Build gateway
        working-directory: minicpm-sidecar
        run: .\scripts\build-gateway.ps1 -Target win-x64

      - name: Verify sidecar binaries
        working-directory: minicpm-sidecar
        run: |
          Get-ChildItem -Recurse bin\win-x64 | Select-Object FullName,Length
          .\bin\win-x64\llama-server.exe --version
          .\bin\win-x64\backends\vulkan\llama-server.exe --version
          .\bin\win-x64\minicpm-sidecar.exe --help | Out-Null

      - name: npm install
        working-directory: clawd-on-desk
        run: npm install --no-audit --no-fund

      - name: Fetch LoRA adapters
        working-directory: clawd-on-desk
        run: node scripts/fetch-adapters.js

      - name: electron-builder (nsis)
        working-directory: clawd-on-desk
        shell: cmd
        run: npx electron-builder --win --x64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            clawd-on-desk/dist/*.exe
            clawd-on-desk/dist/*.exe.blockmap
            clawd-on-desk/dist/latest.yml

  release:
    needs: [build-mac, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          fail_on_unmatched_files: false
